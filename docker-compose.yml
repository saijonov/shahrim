name: shahrim

services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shahrim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shahrim}
      POSTGRES_DB: ${POSTGRES_DB:-shahrim}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shahrim} -d ${POSTGRES_DB:-shahrim}"]
      interval: 5s
      timeout: 5s
      retries: 15

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://shahrim:shahrim@db:5432/shahrim}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      MINIAPP_URL: ${MINIAPP_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
      - uploads:/app/uploads
    command: ["sh", "./entrypoint.sh", "--reload"]

  bot:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://shahrim:shahrim@db:5432/shahrim}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      MINIAPP_URL: ${MINIAPP_URL:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
    command: ["python", "-m", "app.bot"]

  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:
  uploads:
