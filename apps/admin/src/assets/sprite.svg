<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true" focusable="false"><defs>
  <!-- girih star-lattice patterns (subtle background motif) -->
  <pattern id="girih" width="52" height="52" patternUnits="userSpaceOnUse"><g fill="none" stroke="#7C9AD6" stroke-width="0.8"><path d="M0 26 26 0 52 26 26 52Z"></path><path d="M0 0 52 52M52 0 0 52"></path><path d="M26 0V52M0 26H52"></path></g></pattern>
  <pattern id="girih-lt" width="44" height="44" patternUnits="userSpaceOnUse"><g fill="none" stroke="#ffffff" stroke-width="1.2"><path d="M0 22 22 0 44 22 22 44Z"></path><path d="M0 0 44 44M44 0 0 44"></path></g></pattern>

  <!-- brand mark: a majolica dome with a cobalt shell, turquoise core and a gold-white star notch -->
