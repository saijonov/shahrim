    <path d="M12 6.2c2.8 0 4.3 2.2 4.3 5V22H7.7V11.2c0-2.8 1.5-5 4.3-5Z" fill="var(--co-accent,#1CA5A0)"></path>
    <path d="M12 9.2l2 2-2 2-2-2z" fill="#fff"></path>
  </symbol>

