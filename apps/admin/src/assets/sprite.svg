  <symbol id="cat-bus" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="13" rx="3" fill="none" stroke="currentColor" stroke-width="1.9"></rect><path d="M4 11h16M9 4v7" fill="none" stroke="currentColor" stroke-width="1.6"></path><circle cx="8" cy="20" r="1.6" fill="currentColor"></circle><circle cx="16" cy="20" r="1.6" fill="currentColor"></circle><path d="M6 17v2M18 17v2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"></path></symbol>
